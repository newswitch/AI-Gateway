# Nginx配置文件 - AI Gateway 2.0
# 基于OpenResty的动态网关配置

# 工作进程数
worker_processes auto;

# 错误日志
error_log logs/error.log notice;

# 事件模块配置
events {
    worker_connections 1024;
    use epoll;
}

# HTTP模块配置
http {
    # DNS解析器配置（K8s 集群 DNS）
    resolver 10.96.0.10 valid=30s ipv6=off;
    
    # MIME类型
    include mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';

    log_format json escape=json '{
        "remote_addr":"$remote_addr",
        "remote_user":"$remote_user",
        "request":"$request",
        "status":$status,
        "body_bytes_sent":$body_bytes_sent,
        "http_referer":"$http_referer",
        "http_user_agent":"$http_user_agent",
        "http_x_forwarded_for":"$http_x_forwarded_for",
        "request_time":$request_time,
        "upstream_response_time":$upstream_response_time,
        "request_id":"$http_x_request_id"
    }';

    # 访问日志
    access_log logs/access.log json;

    # 基础设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 共享内存配置
    lua_shared_dict config_cache 10m; # 配置缓存
    lua_shared_dict rate_limit 50m; # 限流数据
    lua_shared_dict metrics 20m; # 监控指标
    lua_shared_dict session 30m; # 会话数据
    lua_shared_dict upstream_state 10m; # upstream状态管理

    # Lua设置 - 包含openssl模块路径
    lua_package_path '/usr/local/openresty/nginx/conf/lua/?.lua;/usr/share/lua/common/?.lua;;';
    lua_code_cache on;
    lua_need_request_body on;

    # 初始化脚本
    init_by_lua_block {
        local init = require "init"
        local ok, err = init.init_config()
        if not ok then
            ngx.log(ngx.ERR, "Failed to initialize gateway: ", err)
            os.exit(1)
        end
    }

    # 定时任务
    init_worker_by_lua_block {
        local init = require "init"

        -- 配置同步任务
        local function sync_config()
            local config_sync = require "config.config_sync"
            config_sync.sync_all_configs()
        end

        -- 健康检查任务
        local function health_check()
            local health_checker = require "monitoring.health_check"
            health_checker.check_all_services()
        end

        -- 清理过期数据任务
        local function cleanup_data()
            local request_router = require "routing.request_router"
            request_router.cleanup_expired_data()
        end

        -- 启动定时任务
        local ok, err = ngx.timer.every(30, sync_config) -- 每30秒同步配置
        if not ok then
            ngx.log(ngx.ERR, "Failed to create config sync timer: ", err)
        end

        ok, err = ngx.timer.every(60, health_check) -- 每60秒健康检查
        if not ok then
            ngx.log(ngx.ERR, "Failed to create health check timer: ", err)
        end

        ok, err = ngx.timer.every(300, cleanup_data) -- 每5分钟清理数据
        if not ok then
            ngx.log(ngx.ERR, "Failed to create cleanup timer: ", err)
        end
    }

    # 服务器配置 - 所有配置都通过Lua动态获取
    server {
        listen 80;
        server_name _;
        
        # 声明自定义变量
        set $upstream_backend "";

        # 健康检查
        location /health {
            access_log off;
            content_by_lua_block {
                local request_router = require "routing.request_router"
                request_router.handle_health_check()
            }
        }

        # 统计信息
        location /stats {
            access_log off;
            content_by_lua_block {
                local request_router = require "routing.request_router"
                request_router.handle_stats()
            }
        }

        # 刷新配置
        location /refresh-config {
            access_log off;
            content_by_lua_block {
                local dynamic_config = require "config.dynamic_config"
                local success = dynamic_config.refresh_all_configs()
                
                ngx.header.content_type = "application/json"
                if success then
                    ngx.say(cjson.encode({
                        success = true,
                        message = "All configurations refreshed successfully"
                    }))
                else
                    ngx.status = 500
                    ngx.say(cjson.encode({
                        success = false,
                        error = "Failed to refresh configurations"
                    }))
                end
            }
        }

        # 动态路由 - 所有其他请求
        location / {
            access_by_lua_block {
                local dynamic_router = require "routing.dynamic_router"
                dynamic_router.route_request()
            }
            
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            proxy_intercept_errors on;
            error_page 502 503 504 = @error_handler;
        }

        # 错误处理
        location @error_handler {
            internal;
            content_by_lua_block {
                local status = ngx.status
                local error_messages = {
                    [502] = "Bad Gateway",
                    [503] = "Service Unavailable",
                    [504] = "Gateway Timeout"
                }
                ngx.header.content_type = "application/json"
                ngx.say(cjson.encode({
                    error = "upstream_error",
                    message = error_messages[status] or "Unknown error",
                    status = status,
                    request_id = ngx.var.http_x_request_id
                }))
            }
        }
    }
} 