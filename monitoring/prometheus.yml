global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  # 收集配置中心指标
  - job_name: 'ai-gateway-config-center'
    static_configs:
      - targets: ['ai-gateway-config-center-dev:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

