<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问日志 | 大模型网关配置中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#0FC6C2',
            success: '#00B42A',
            warning: '#FF7D00',
            danger: '#F53F3F',
            dark: '#1D2129',
            'dark-2': '#4E5969',
            'light-1': '#F2F3F5',
            'light-2': '#E5E6EB',
            'light-3': '#C9CDD4',
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <!-- 自定义工具类 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .card-shadow {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      }
      .token-badge {
        @apply px-2 py-1 rounded-full text-xs font-medium;
      }
      .policy-badge {
        @apply px-2 py-0.5 rounded-full text-xs font-medium;
      }
      .log-level-danger {
        @apply bg-danger/10 text-danger;
      }
      .log-level-warning {
        @apply bg-warning/10 text-warning;
      }
      .log-level-info {
        @apply bg-primary/10 text-primary;
      }
    }
  </style>
</head>
<body class="bg-gray-50 font-inter text-dark min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <header class="bg-white border-b border-light-2 sticky top-0 z-50 transition-all duration-300" id="navbar">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo 和标题 -->
        <div class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center">
            <i class="fa fa-server text-white text-xl"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-dark">大模型网关配置中心</h1>
            <p class="text-xs text-light-3">LLM Gateway Configuration</p>
          </div>
        </div>
        
        <!-- 搜索栏 -->
        <div class="hidden md:block flex-grow max-w-md mx-8">
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <i class="fa fa-search text-light-3"></i>
            </span>
            <input type="text" placeholder="搜索日志内容或请求ID..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-light-2 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
          </div>
        </div>
        
        <!-- 用户菜单 -->
        <div class="flex items-center space-x-4">
          <button class="text-light-3 hover:text-primary transition-colors">
            <i class="fa fa-bell-o text-xl"></i>
          </button>
          <button class="text-light-3 hover:text-primary transition-colors">
            <i class="fa fa-cog text-xl"></i>
          </button>
          <div class="flex items-center space-x-2 cursor-pointer group">
            <img src="https://picsum.photos/id/1005/200/200" alt="用户头像" class="w-8 h-8 rounded-full object-cover border-2 border-transparent group-hover:border-primary transition-all">
            <span class="hidden md:inline text-sm font-medium">管理员</span>
            <i class="fa fa-angle-down text-light-3 group-hover:text-primary transition-colors"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- 侧边栏 -->
    <aside class="w-64 bg-white border-r border-light-2 flex-shrink-0 hidden md:block overflow-y-auto scrollbar-hide transition-all duration-300" id="sidebar">
      <nav class="py-4">
        <div class="px-4 py-2 mb-4">
          <p class="text-xs font-medium text-light-3 uppercase tracking-wider">主菜单</p>
        </div>
        
        <a href="#" class="flex items-center px-4 py-3 text-primary bg-primary/5 border-r-4 border-primary">
          <i class="fa fa-dashboard w-5 text-center mr-3"></i>
          <span>总览</span>
        </a>
        
        <a href="model-routing.html" class="flex items-center px-4 py-3 text-dark-2 hover:bg-light-1 transition-colors">
          <i class="fa fa-exchange w-5 text-center mr-3"></i>
          <span>模型路由</span>
        </a>
        
        <a href="#" class="flex items-center px-4 py-3 text-primary bg-primary/5 border-r-4 border-primary">
          <i class="fa fa-cubes w-5 text-center mr-3"></i>
          <span>命名空间管理</span>
        </a>
        
        <a href="policy-configuration.html" class="flex items-center px-4 py-3 text-dark-2 hover:bg-light-1 transition-colors">
          <i class="fa fa-filter w-5 text-center mr-3"></i>
          <span>策略配置</span>
        </a>
              
        <a href="traffic-monitoring.html" class="flex items-center px-4 py-3 text-dark-2 hover:bg-light-1 transition-colors">
          <i class="fa fa-bar-chart w-5 text-center mr-3"></i>
          <span>流量监控</span>
        </a>
        
        <a href="access-logs.html" class="flex items-center px-4 py-3 text-dark-2 hover:bg-light-1 transition-colors">
          <i class="fa fa-history w-5 text-center mr-3"></i>
          <span>访问日志</span>
        </a>
        
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 overflow-y-auto bg-gray-50 scrollbar-hide">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- 页面标题 -->
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-dark">访问日志管理</h2>
            <p class="text-light-3 mt-1">查询、筛选和分析大模型网关的请求日志</p>
          </div>
          <div class="mt-4 sm:mt-0 flex space-x-3">
            <button id="exportLogsBtn" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
              <i class="fa fa-download mr-2"></i>
              <span>导出日志</span>
            </button>
            <button id="clearLogsBtn" class="bg-light-1 hover:bg-light-2 text-dark-2 px-4 py-2 rounded-lg transition-colors flex items-center">
              <i class="fa fa-trash mr-2"></i>
              <span>清理日志</span>
            </button>
          </div>
        </div>
        
        <!-- 日志搜索和筛选（优化后避免重叠） -->
        <div class="bg-white rounded-xl p-5 card-shadow mb-6">
          <h3 class="font-semibold text-lg mb-4">日志筛选</h3>
          <!-- 第一行筛选：时间范围占满整行，适应各种屏幕 -->
          <div class="grid grid-cols-1 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-dark-2 mb-1">时间范围</label>
              <div class="flex flex-wrap gap-2 items-center">
                <input type="datetime-local" class="flex-1 min-w-[140px] px-3 py-2 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
                <span class="text-light-3 whitespace-nowrap">至</span>
                <input type="datetime-local" class="flex-1 min-w-[140px] px-3 py-2 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
              </div>
            </div>
          </div>
          
          <!-- 第二行筛选：中等屏幕2列，大屏幕4列 -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-dark-2 mb-1">日志级别</label>
              <div class="relative">
                <select class="w-full pl-3 pr-8 py-2 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary appearance-none">
                  <option>全部级别</option>
                  <option>ERROR</option>
                  <option>WARN</option>
                  <option>INFO</option>
                  <option>DEBUG</option>
                </select>
                <i class="fa fa-chevron-down absolute right-3 top-3 text-light-3 pointer-events-none text-xs"></i>
              </div>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-dark-2 mb-1">模型名称</label>
              <div class="relative">
                <select class="w-full pl-3 pr-8 py-2 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary appearance-none">
                  <option>全部模型</option>
                  <option>llm-gpt4-prod</option>
                  <option>llm-chatglm-prod</option>
                  <option>llm-bloom-dev</option>
                  <option>llm-stablelm-test</option>
                </select>
                <i class="fa fa-chevron-down absolute right-3 top-3 text-light-3 pointer-events-none text-xs"></i>
              </div>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-dark-2 mb-1">请求状态</label>
              <div class="relative">
                <select class="w-full pl-3 pr-8 py-2 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary appearance-none">
                  <option>全部状态</option>
                  <option>成功</option>
                  <option>失败</option>
                  <option>限流</option>
                  <option>认证失败</option>
                </select>
                <i class="fa fa-chevron-down absolute right-3 top-3 text-light-3 pointer-events-none text-xs"></i>
              </div>
            </div>
          </div>
          
          <!-- 搜索和按钮区域：使用flex-wrap确保小屏幕不重叠 -->
          <div class="mt-4 flex flex-wrap gap-4">
            <div class="relative w-full sm:w-auto flex-grow max-w-md">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                <i class="fa fa-search text-light-3"></i>
              </span>
              <input type="text" placeholder="搜索请求ID、IP地址或日志内容..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-light-2 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all">
            </div>
            
            <div class="flex space-x-3">
              <button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                <i class="fa fa-search mr-2"></i>
                <span>搜索</span>
              </button>
              <button class="bg-light-1 hover:bg-light-2 text-dark-2 px-4 py-2 rounded-lg transition-colors">
                重置
              </button>
            </div>
          </div>
        </div>
        
        <!-- 日志统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-xl p-5 card-shadow card-hover">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-light-3 text-sm">今日日志总数</p>
                <h3 class="text-2xl font-bold mt-1">148,523</h3>
                <p class="text-success text-xs mt-2 flex items-center">
                  <i class="fa fa-arrow-up mr-1"></i>
                  <span>较昨日增长 12.5%</span>
                </p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                <i class="fa fa-file-text-o text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl p-5 card-shadow card-hover">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-light-3 text-sm">错误日志数</p>
                <h3 class="text-2xl font-bold mt-1">475</h3>
                <p class="text-danger text-xs mt-2 flex items-center">
                  <i class="fa fa-arrow-up mr-1"></i>
                  <span>较昨日上升 0.05%</span>
                </p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-danger/10 flex items-center justify-center text-danger">
                <i class="fa fa-exclamation-circle text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl p-5 card-shadow card-hover">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-light-3 text-sm">警告日志数</p>
                <h3 class="text-2xl font-bold mt-1">1,293</h3>
                <p class="text-warning text-xs mt-2 flex items-center">
                  <i class="fa fa-arrow-down mr-1"></i>
                  <span>较昨日下降 5.2%</span>
                </p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-warning/10 flex items-center justify-center text-warning">
                <i class="fa fa-exclamation-triangle text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl p-5 card-shadow card-hover">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-light-3 text-sm">日志存储占用</p>
                <h3 class="text-2xl font-bold mt-1">18.7 GB</h3>
                <p class="text-success text-xs mt-2 flex items-center">
                  <i class="fa fa-arrow-up mr-1"></i>
                  <span>较昨日增长 0.8 GB</span>
                </p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-success/10 flex items-center justify-center text-success">
                <i class="fa fa-hdd-o text-xl"></i>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 日志分布图表 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <div class="bg-white rounded-xl p-5 card-shadow">
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-semibold text-lg">日志级别分布</h3>
              <div class="flex space-x-2">
                <button class="px-3 py-1 text-xs bg-primary/10 text-primary rounded-full">今日</button>
                <button class="px-3 py-1 text-xs bg-light-1 text-dark-2 rounded-full hover:bg-primary/10 hover:text-primary transition-colors">本周</button>
                <button class="px-3 py-1 text-xs bg-light-1 text-dark-2 rounded-full hover:bg-primary/10 hover:text-primary transition-colors">本月</button>
              </div>
            </div>
            <div class="h-72">
              <canvas id="logLevelChart"></canvas>
            </div>
          </div>
          
          <div class="bg-white rounded-xl p-5 card-shadow">
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-semibold text-lg">日志趋势</h3>
              <div class="flex space-x-2">
                <button class="px-3 py-1 text-xs bg-primary/10 text-primary rounded-full">按小时</button>
                <button class="px-3 py-1 text-xs bg-light-1 text-dark-2 rounded-full hover:bg-primary/10 hover:text-primary transition-colors">按天</button>
                <button class="px-3 py-1 text-xs bg-light-1 text-dark-2 rounded-full hover:bg-primary/10 hover:text-primary transition-colors">按周</button>
              </div>
            </div>
            <div class="h-72">
              <canvas id="logTrendChart"></canvas>
            </div>
          </div>
        </div>
        
        <!-- 日志列表 -->
        <div class="bg-white rounded-xl card-shadow overflow-hidden">
          <div class="p-5 border-b border-light-2 flex justify-between items-center">
            <h3 class="font-semibold text-lg">日志记录</h3>
            <div class="flex space-x-3">
              <div class="relative">
                <select class="pl-3 pr-8 py-1.5 border border-light-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary appearance-none bg-white">
                  <option>每页显示 10 条</option>
                  <option>每页显示 20 条</option>
                  <option>每页显示 50 条</option>
                  <option>每页显示 100 条</option>
                </select>
                <i class="fa fa-chevron-down absolute right-3 top-2.5 text-light-3 pointer-events-none text-xs"></i>
              </div>
              <button class="text-light-3 hover:text-primary transition-colors">
                <i class="fa fa-refresh"></i>
              </button>
            </div>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50">
                  <th class="px-5 py-3 text-left text-xs font-medium text-light-3 uppercase tracking-wider">
                    <div class="flex items-center">
                      <input type="checkbox" class="mr-2 rounded text-primary focus:ring-primary">
                      时间
                      <i class="fa fa-sort-desc ml-1 text-light-3"></i>
                    </div>
                  </th>
                  <th class="px-5 py-3 text-left text-xs font-medium text-light-3 uppercase tracking-wider">级别</th>
                  <th class="px-5 py-3 text-left text-xs font-medium text-light-3 uppercase tracking-wider">请求ID</th>
                  <th class="px-5 py-3 text-left text-xs font-medium text-light-3 uppercase tracking-wider">模型</th>
                  <th class="px-5 py-3 text-left text-xs font-medium text-light-3 uppercase tracking-wider">客户端IP</th>
